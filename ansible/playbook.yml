---
# Cloud-1 メインPlaybook
# 実行: ansible-playbook playbook.yml

- name: Cloud-1 Inception デプロイ
  hosts: cloud1
  become: yes

  vars_files:
    - vars/secrets.yml

  roles:
    - common
    - inception

  post_tasks:
    - name: デプロイ完了メッセージ
      ansible.builtin.debug:
        msg: |
          ========================================
          ✅ デプロイ完了!
          WordPress: https://{{ ec2_public_ip }}
          phpMyAdmin: https://{{ ec2_public_ip }}/phpmyadmin/
          SSM接続: aws ssm start-session --target {{ inventory_hostname }}
          ========================================
